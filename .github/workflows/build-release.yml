name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: ModularAnalysis-windows
          - os: macos-latest
            artifact_name: ModularAnalysis-macos
          - os: ubuntu-latest
            artifact_name: ModularAnalysis-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller modular_analysis.spec

      - name: Zip output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/ModularAnalysis/* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Zip output (macOS/Linux)
        if: runner.os != 'Windows'
        run: cd dist && zip -r ../${{ matrix.artifact_name }}.zip ModularAnalysis/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}.zip
